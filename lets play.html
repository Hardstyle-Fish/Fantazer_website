<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НЕ ДУМАЙ, ЛОПАЙ</title>
    <link rel="icon" type="image/png" href="assets/фантазер_иконка.png">
    <link rel="stylesheet" href="game style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #030a40 0%, #312e81 50%, #4c1d95 100%);
            overflow: hidden;
            height: 100vh;
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

       .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            animation: float 4s ease-in-out infinite;
            opacity: 0.5; 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 6px 24px rgba(0, 0, 0, 0.15),
                inset 0 3px 12px rgba(255, 255, 255, 0.15);
}

        .bubble:hover {
            transform: scale(1.1);
        }

        .bubble.popped {
            animation: pop 0.1s ease-out forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }

        .back-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 1001;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .game-title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: 600;
            z-index: 1001;
            text-align: center;
        }

        .score-counter {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #7dd3fc;
            font-size: 18px;
            z-index: 1001;
            text-align: center;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 1001;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 22px;
                top: 20px;
            }

            .score-counter {
                font-size: 16px;
                top: 60px;
            }

            .back-btn {
                top: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 14px;
            }

            .instructions {
                font-size: 12px;
                bottom: 20px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <a href="index.html" class="back-btn">← Назад</a>
        <div class="game-title">Лопайте кружки!</div>
        <div class="score-counter">Счет: <span id="score">0</span></div>
        <div class="instructions">Наводите курсор на кружки, чтобы лопнуть их</div>
    </div>

    <script>
        let score = 0;
        let gameActive = true;

        window.addEventListener('load', function() {
            createBubbles();
        });

        function createBubbles() {
            const gameContainer = document.getElementById('gameContainer');
            const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#c084fc', '#d8b4fe', '#7dd3fc', '#93CEF7'];
            
            for (let i = 0; i < 20; i++) {
                createNewBubble();
            }
        }

        function createNewBubble() {
            const gameContainer = document.getElementById('gameContainer');
            const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#c084fc', '#d8b4fe', '#7dd3fc', '#93CEF7'];
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            const size = Math.random() * 80 + 40;
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.background = color;
            bubble.style.left = `${Math.random() * (window.innerWidth - size)}px`;
            bubble.style.top = `${Math.random() * (window.innerHeight - size)}px`;
            bubble.style.animationDelay = `${Math.random() * 2}s`;
            
            bubble.addEventListener('mouseover', function() {
                if (!bubble.classList.contains('popped') && gameActive) {
                    bubble.classList.add('popped');
                    score++;
                    document.getElementById('score').textContent = score;
                    
                    setTimeout(() => {
                        if (gameActive) {
                            createNewBubble();
                        }
                        bubble.remove();
                    }, 300);
                }
            });
            
            gameContainer.appendChild(bubble);
        }

        window.addEventListener('beforeunload', function() {
            gameActive = false;
        });
    </script>
</body>

</html>
